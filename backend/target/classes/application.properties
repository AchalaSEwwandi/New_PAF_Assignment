spring.application.name=smart-campus-backend

# Allow large JSON bodies for Base64 image attachments (up to 3 images ~10MB each)
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
server.tomcat.max-swallow-size=-1

spring.data.mongodb.uri=mongodb+srv://ITPM_db_user:12345@cluster-itpm.farjx9r.mongodb.net/?retryWrites=true&w=majority&tlsAllowInvalidCertificates=true&serverSelectionTimeoutMS=60000&connectTimeoutMS=30000
spring.data.mongodb.database=smart_campus
spring.data.mongodb.auto-index-creation=true

server.port=${SERVER_PORT:8082}

# Frontend base URL for QR code links.
# Leave as "auto" (or remove this line) to auto-detect your local network IP at runtime.
# Only set a fixed IP if auto-detection ever picks the wrong network interface.
frontend.base-url=auto

# Email Configuration (Update with real credentials for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
